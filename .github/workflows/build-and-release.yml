name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-x64:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Publish Windows x64
      run: |
        dotnet publish SecretEmv.GenAC/SecretEmv.GenAC.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -o ./publish/win-x64 `
          /p:PublishProfile= `
          /p:Platform=x64 `
          /p:PublishSingleFile=true `
          /p:PublishReadyToRun=false `
          /p:PublishTrimmed=false
    
    - name: Create ZIP
      run: Compress-Archive -Path ./publish/win-x64/* -DestinationPath ./SecretEMV-win-x64.zip
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SecretEMV-win-x64
        path: ./SecretEMV-win-x64.zip
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: ./SecretEMV-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}