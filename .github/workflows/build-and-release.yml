name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    # Skip the regular build step that tries to build all platforms
    # and go straight to publish with specific parameters
    
    - name: Publish Windows x64 (Self-Contained)
      run: |
        dotnet publish SecretEmv.GenAC/SecretEmv.GenAC.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          --output ./publish/win-x64 `
          /p:Platform=x64 `
          /p:PublishProfile= `
          /p:PublishSingleFile=true `
          /p:IncludeNativeLibrariesForSelfExtract=true `
          /p:EnableCompressionInSingleFile=true `
          /p:PublishReadyToRun=false `
          /p:PublishTrimmed=false
    
    - name: Publish Windows ARM64 (Self-Contained)
      run: |
        dotnet publish SecretEmv.GenAC/SecretEmv.GenAC.csproj `
          --configuration Release `
          --runtime win-arm64 `
          --self-contained true `
          --output ./publish/win-arm64 `
          /p:Platform=ARM64 `
          /p:PublishProfile= `
          /p:PublishSingleFile=true `
          /p:IncludeNativeLibrariesForSelfExtract=true `
          /p:EnableCompressionInSingleFile=true `
          /p:PublishReadyToRun=false `
          /p:PublishTrimmed=false
    
    - name: Create Windows x64 ZIP
      run: Compress-Archive -Path ./publish/win-x64/* -DestinationPath ./SecretEMV-win-x64.zip
    
    - name: Create Windows ARM64 ZIP
      run: Compress-Archive -Path ./publish/win-arm64/* -DestinationPath ./SecretEMV-win-arm64.zip
    
    - name: Upload Windows x64 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SecretEMV-win-x64
        path: ./SecretEMV-win-x64.zip
    
    - name: Upload Windows ARM64 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SecretEMV-win-arm64
        path: ./SecretEMV-win-arm64.zip
    
    # Create GitHub Release on version tags
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./SecretEMV-win-x64.zip
          ./SecretEMV-win-arm64.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}